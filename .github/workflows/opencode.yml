name: opencode

on:
  issue_comment:
    types: [created]
  repository_dispatch:
    types: [opencode_fix] # Đón lệnh từ Slack/OpenClaw gửi sang

jobs:
  opencode:
    # Sửa điều kiện IF: Chạy nếu là lệnh Dispatch HOẶC là comment có chứa /oc
    if: |
      github.event_name == 'repository_dispatch' ||
      contains(github.event.comment.body, '/oc') ||
      startsWith(github.event.comment.body, '/oc')
    
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: write      # Cần write để sửa code
      pull-requests: write # Cần write để tạo PR
      issues: write        # Cần write để tạo/cập nhật issue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Dùng v4 cho ổn định
        with:
          fetch-depth: 0
          persist-credentials: true # Cần true để push code

      # BƯỚC 1: TỰ ĐỘNG TẠO TICKET JIRA
      - name: Create Jira Ticket
        id: jira
        run: |
          # Lấy nội dung yêu cầu từ Slack (payload) hoặc Comment
          PROMPT="${{ github.event.client_payload.description || github.event.comment.body }}"
          
          RESPONSE=$(curl -s -u "${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}" \
            -X POST -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": { \"key\": \"SCRUM\" },
                \"summary\": \"AI Task: $PROMPT\",
                \"issuetype\": { \"name\": \"Bug\" }
              }
            }" "${{ secrets.JIRA_URL }}/rest/api/2/issue")
          
          TICKET_KEY=$(echo $RESPONSE | jq -r '.key')
          echo "ticket_key=$TICKET_KEY" >> $GITHUB_OUTPUT
          echo "✅ Đã tạo Jira: $TICKET_KEY"

      # BƯỚC 2: CHẠY OPENCODE ĐỂ SỬA CODE
      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          # Ép model Flash cho nhanh hoặc Pro tùy Tân
          model: google/gemini-3-flash 
          # Truyền mã ticket Jira vào context để OpenCode biết đường ghi vào commit
          custom_prompt: "Task: ${{ github.event.client_payload.description }}. Jira ID: ${{ steps.jira.outputs.ticket_key }}"

      # BƯỚC 3: (OPENCODE THƯỜNG TỰ TẠO PR, NẾU KHÔNG TÂN CÓ THỂ THÊM BƯỚC PUSH Ở ĐÂY)