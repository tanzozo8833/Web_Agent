name: OpenCode Auto Fixer

on:
  repository_dispatch:
    types: [opencode_fix] # Phải khớp với event_type ở Bước 1

jobs:
  fix-bug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenCode to fix bug
        run: |
          echo "Đang xử lý bug: ${{ github.event.client_payload.description }}"
          echo "Liên kết với Jira: ${{ github.event.client_payload.jira_id }}"
          # Chỗ này bạn gọi lệnh của OpenCode để sửa file
          # Ví dụ: opencode fix --prompt "${{ github.event.client_payload.description }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: ${{ github.event.client_payload.description }}"
          title: "Auto-fix for ${{ github.event.client_payload.jira_id }}"
          body: "This PR was automatically generated by OpenClaw & OpenCode."
          branch: "fix/${{ github.event.client_payload.jira_id }}"
          delete-branch: true
