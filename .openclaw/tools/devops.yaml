tools:
  - name: handle_devops_request
    description: "Tự động tạo ticket Jira và kích hoạt OpenCode trên GitHub để sửa bug/yêu cầu từ người dùng"
    parameters:
      summary: "Mô tả ngắn gọn yêu cầu hoặc lỗi (VD: Đổi màu nút sang xanh)"
      issue_type: "Loại ticket trên Jira (mặc định là Bug)"
      repo: "Đường dẫn repo GitHub theo dạng 'user/repo-name' (VD: hoangductan733/my-app)"
    command: |
      # --- PHẦN 1: TẠO TICKET TRÊN JIRA ---
      # Sử dụng các biến môi trường JIRA_URL, JIRA_USER, JIRA_API_TOKEN từ file .env
      echo "--- Đang khởi tạo ticket trên Jira ---"
      
      JIRA_RES=$(curl -s -u "$JIRA_USER:$JIRA_API_TOKEN" \
        -X POST \
        -H "Content-Type: application/json" \
        --data "{
          \"fields\": {
            \"project\": { \"key\": \"SCRUM\" },
            \"summary\": \"$summary\",
            \"description\": \"Yêu cầu tự động từ DevOps Agent: $summary\",
            \"issuetype\": { \"name\": \"$issue_type\" }
          }
        }" \
        "$JIRA_URL/rest/api/2/issue")

      # Trích xuất Ticket ID (Key) bằng jq
      TICKET_ID=$(echo $JIRA_RES | jq -r '.key')

      if [ "$TICKET_ID" == "null" ] || [ -z "$TICKET_ID" ]; then
        echo "Lỗi khi tạo ticket Jira: $JIRA_RES"
        exit 1
      fi

      echo "✅ Đã tạo thành công ticket Jira: $TICKET_ID"

      # --- PHẦN 2: TRIGGER GITHUB ACTIONS (OPENCODE) ---
      echo "--- Đang kích hoạt GitHub Dispatch cho OpenCode ---"

      # Lưu ý: Client_payload sử dụng 'description' để khớp với file .yml của bạn
      GH_RES=$(curl -s -o /dev/null -w "%{http_code}" \
        -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "X-GitHub-Api-Version: 2022-11-28" \
        "https://api.github.com/repos/$repo/dispatches" \
        -d "{
          \"event_type\": \"opencode_fix\",
          \"client_payload\": {
            \"description\": \"$summary\",
            \"jira_id\": \"$TICKET_ID\"
          }
        }")

      if [ "$GH_RES" == "204" ]; then
        echo "🚀 Đã gửi tín hiệu sang GitHub thành công (HTTP 204)!"
        echo "Hệ thống đang bắt đầu sửa code tại repo $repo. Vui lòng kiểm tra tab Actions trên GitHub."
      else
        echo "❌ Lỗi khi gửi tín hiệu sang GitHub. Mã lỗi HTTP: $GH_RES"
        exit 1
      fi